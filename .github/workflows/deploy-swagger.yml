name: Deploy Swagger to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          npm install swagger-ui-dist
          npm install yamljs
          
      - name: Generate Swagger HTML
        run: |
          mkdir -p public
          node -e "
          const fs = require('fs');
          const YAML = require('yamljs');
          const swaggerDoc = YAML.load('./docs/openapi.yaml');
          
          const html = \`
          <!DOCTYPE html>
          <html>
          <head>
            <title>ConsentHub API Documentation</title>
            <link rel='stylesheet' type='text/css' href='https://unpkg.com/swagger-ui-dist@4.15.5/swagger-ui.css' />
            <style>
              html { box-sizing: border-box; overflow: -moz-scrollbars-vertical; overflow-y: scroll; }
              *, *:before, *:after { box-sizing: inherit; }
              body { margin:0; background: #fafafa; }
            </style>
          </head>
          <body>
            <div id='swagger-ui'></div>
            <script src='https://unpkg.com/swagger-ui-dist@4.15.5/swagger-ui-bundle.js'></script>
            <script>
              const ui = SwaggerUIBundle({
                spec: \${JSON.stringify(swaggerDoc)},
                dom_id: '#swagger-ui',
                deepLinking: true,
                presets: [
                  SwaggerUIBundle.presets.apis,
                  SwaggerUIBundle.presets.standalone
                ],
                plugins: [
                  SwaggerUIBundle.plugins.DownloadUrl
                ],
                layout: 'StandaloneLayout'
              });
            </script>
          </body>
          </html>
          \`;
          
          fs.writeFileSync('./public/index.html', html);
          fs.copyFileSync('./docs/openapi.yaml', './public/openapi.yaml');
          "
          
      - name: Setup Pages
        uses: actions/configure-pages@v3
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: './public'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
