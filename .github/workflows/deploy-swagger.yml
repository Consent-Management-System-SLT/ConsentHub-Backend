name: Deploy Swagger Documentation to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: |
          npm install swagger-ui-dist yamljs
          
      - name: Create deployment directory
        run: |
          mkdir -p public
          
      - name: Copy existing docs and ensure proper structure
        run: |
          # Copy the current index.html and openapi.yaml
          cp docs/index.html public/index.html
          cp docs/openapi.yaml public/openapi.yaml
          
      - name: Verify files exist
        run: |
          ls -la public/
          echo "Contents of index.html:"
          head -20 public/index.html
      - name: Verify files exist
        run: |
          ls -la public/
          echo "Contents of index.html:"
          head -20 public/index.html
          
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
