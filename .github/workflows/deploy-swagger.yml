name: Deploy Swagger UI to GitHub Pages

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Create public directory
        run: mkdir -p public
      
      - name: Copy Swagger files
        run: |
          cp docs/index.html public/index.html
          cp docs/openapi.yaml public/openapi.yaml
      
      - name: Verify deployment files
        run: |
          echo "Files in public directory:"
          ls -la public/
          echo "First 20 lines of index.html:"
          head -20 public/index.html
          echo "First 10 lines of openapi.yaml:"
          head -10 public/openapi.yaml
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './public'
          
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
